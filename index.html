<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fitness Tracker Dashboard</title>
    <style>
        :root {
            --bg-primary: #121214;
            --bg-secondary: #1a1a1e;
            --bg-surface: #26262b;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --accent-run: #ff4757;
            --accent-bike: #1e90ff;
            --accent-strength: #2ed573;
            --accent-misc: #ffa502;
            --border-color: #374151;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-main);
            padding: 24px;
            line-height: 1.5;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 16px;
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 14px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 16px;
            margin-bottom: 32px;
        }

        .stat-card {
            background-color: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
        }

        .stat-card.run::before { background-color: var(--accent-run); }
        .stat-card.bike::before { background-color: var(--accent-bike); }
        .stat-card.strength::before { background-color: var(--accent-strength); }
        .stat-card.misc::before { background-color: var(--accent-misc); }

        .stat-label {
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
            margin-bottom: 4px;
        }

        .stat-value {
            font-size: 26px;
            font-weight: 700;
            line-height: 1.2;
        }

        .stat-progress {
            font-size: 13px;
            margin-top: 6px;
            color: var(--text-muted);
        }
        
        .progress-percentage {
            font-weight: 600;
            color: #6366f1;
        }

        .workspace {
            display: flex;
            gap: 24px;
            flex-wrap: wrap;
        }

        .form-section {
            flex: 1;
            min-width: 320px;
            background-color: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 24px;
            align-self: flex-start;
        }

        .history-section {
            flex: 2;
            min-width: 450px;
            background-color: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 24px;
        }

        h2 {
            font-size: 18px;
            margin-bottom: 20px;
            font-weight: 600;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-row {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
        }

        .form-row .form-group {
            flex: 1;
            margin-bottom: 0;
        }

        label {
            display: block;
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 6px;
        }

        input, textarea, select {
            width: 100%;
            background-color: var(--bg-surface);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 10px 12px;
            color: var(--text-main);
            font-size: 14px;
            transition: border-color 0.2s;
        }

        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #6366f1;
        }

        form button {
            width: 100%;
            background-color: #4f46e5;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 8px;
        }

        form button:hover {
            background-color: #4338ca;
        }

        form button:disabled {
            background-color: var(--border-color);
            color: var(--text-muted);
            cursor: not-allowed;
        }

        .table-container {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: center;
            font-size: 13px;
        }

        th {
            color: var(--text-muted);
            font-weight: 600;
            padding: 12px 8px;
            border-bottom: 2px solid var(--border-color);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        th.row-label-header, td.row-label {
            text-align: left;
            font-weight: 600;
            color: var(--text-main);
            min-width: 110px;
        }

        td {
            padding: 12px 8px;
            border-bottom: 1px solid var(--border-color);
            color: var(--text-muted);
        }

        tr:hover td {
            background-color: var(--bg-surface);
        }
        
        td.has-value {
            color: var(--text-main);
            font-weight: 500;
        }

        .status-msg {
            font-size: 13px;
            margin-top: 8px;
            text-align: center;
            display: none;
        }
        .status-success { color: #2ed573; }
        .status-error { color: #ff4757; }

        @media (max-width: 768px) {
            .workspace {
                flex-direction: column;
            }
            .form-section, .history-section {
                width: 100%;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div>
            <h1>Fitness Tracker</h1>
            <div class="subtitle">Cloud-connected ledger database app</div>
        </div>
    </header>

    <div class="stats-grid">
        <div class="stat-card run">
            <div class="stat-label">Running Today</div>
            <div class="stat-value" id="stat-run">...</div>
            <div class="stat-progress" id="progress-run"></div>
        </div>
        <div class="stat-card bike">
            <div class="stat-label">Cycling Today</div>
            <div class="stat-value" id="stat-bike">...</div>
            <div class="stat-progress" id="progress-bike"></div>
        </div>
        <div class="stat-card strength">
            <div class="stat-label">Strength Today</div>
            <div class="stat-value" id="stat-strength">...</div>
            <div class="stat-progress" id="progress-strength"></div>
        </div>
        <div class="stat-card misc">
            <div class="stat-label">Reps Today</div>
            <div class="stat-value" id="stat-reps">...</div>
            <div class="stat-progress" id="progress-reps"></div>
        </div>
    </div>

    <div class="workspace">
        <div class="form-section">
            <h2>Log Activity</h2>
            <form id="activityForm">
                <div class="form-group">
                    <label for="date">Date</label>
                    <input type="date" id="date" required>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="runTime">Run Time (min)</label>
                        <input type="number" id="runTime" min="0" placeholder="0">
                    </div>
                    <div class="form-group">
                        <label for="bikeTime">Bike Time (min)</label>
                        <input type="number" id="bikeTime" min="0" placeholder="0">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="strengthTime">Strength (min)</label>
                        <input type="number" id="strengthTime" min="0" placeholder="0">
                    </div>
                    <div class="form-group">
                        <label for="deficit">Calorie Deficit</label>
                        <input type="number" id="deficit" min="0" placeholder="0">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="crunches">Crunches</label>
                        <input type="number" id="crunches" min="0" placeholder="0">
                    </div>
                    <div class="form-group">
                        <label for="pullups">Pull Ups</label>
                        <input type="number" id="pullups" min="0" placeholder="0">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="weight">Weight (lbs)</label>
                        <input type="number" step="0.1" id="weight" placeholder="0.0">
                    </div>
                    <div class="form-group">
                        <label for="alcohol">Alcohol Units</label>
                        <input type="number" id="alcohol" min="0" placeholder="0">
                    </div>
                </div>

                <div class="form-group">
                    <label for="notes">Daily Highlights / Notes</label>
                    <textarea id="notes" rows="3" placeholder="Good things, family updates, sleep, etc..."></textarea>
                </div>

                <button type="submit" id="submitBtn">Save Entry to Cloud</button>
                <div id="statusMessage" class="status-msg"></div>
            </form>
        </div>

        <div class="history-section">
            <h2 id="weekViewTitle">Week to Date Summary</h2>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th class="row-label-header">Metric</th>
                            <th id="th-mon">Mon</th>
                            <th id="th-tue">Tue</th>
                            <th id="th-wed">Wed</th>
                            <th id="th-thu">Thu</th>
                            <th id="th-fri">Fri</th>
                            <th id="th-sat">Sat</th>
                            <th id="th-sun">Sun</th>
                        </tr>
                    </thead>
                    <tbody id="weekTableBody">
                        <tr><td colspan="8" style="text-align:center;">Loading cloud summary...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    const CLOUD_URL = "https://script.google.com/macros/s/AKfycbzcrx4r1kJ_02dx4HH5ZJeULmv3EAyi2ahQSL1F935vUx_R71uXL3kU8wgypel9TKkd/exec";
    let fitnessData = [];

    const WEEKLY_GOALS = {
        run: 180,
        bike: 420,
        strength: 240,
        pullups: 300,
        crunches: 18000
    };

    const dateInput = document.getElementById('date');
    dateInput.valueAsDate = new Date();

    dateInput.addEventListener('change', () => {
        if(fitnessData.length > 0) renderDashboard();
    });

    const form = document.getElementById('activityForm');
    const submitBtn = document.getElementById('submitBtn');
    const statusMessage = document.getElementById('statusMessage');

    function fetchCloudHistory() {
        fetch(CLOUD_URL)
        .then(response => response.json())
        .then(data => {
            if (Array.isArray(data)) {
                fitnessData = data;
                renderDashboard();
            }
        })
        .catch(error => {
            console.error('Error fetching data:', error);
            document.getElementById('weekTableBody').innerHTML = '<tr><td colspan="8" style="text-align:center; color:#ff4757;">Failed to download metrics from cloud.</td></tr>';
        });
    }

    // Returns array of ISO date strings [Mon, Tue, ..., Sun] based on target date
    function getWeekDays(dateString) {
        const target = new Date(dateString + 'T00:00:00');
        const dayOfWeek = target.getDay(); 
        
        const monday = new Date(target);
        monday.setDate(target.getDate() - (dayOfWeek === 0 ? 6 : dayOfWeek - 1));
        
        const days = [];
        for(let i = 0; i < 7; i++) {
            const current = new Date(monday);
            current.setDate(monday.getDate() + i);
            days.push(current.toISOString().split('T')[0]);
        }
        return days;
    }

    form.addEventListener('submit', function(e) {
        e.preventDefault();
        submitBtn.disabled = true;
        submitBtn.innerText = "Saving to Google Sheet...";
        statusMessage.style.display = "none";
        
        const entry = {
            date: dateInput.value,
            runTime: parseInt(document.getElementById('runTime').value) || 0,
            bikeTime: parseInt(document.getElementById('bikeTime').value) || 0,
            strengthTime: parseInt(document.getElementById('strengthTime').value) || 0,
            deficit: parseInt(document.getElementById('deficit').value) || 0,
            crunches: parseInt(document.getElementById('crunches').value) || 0,
            pullups: parseInt(document.getElementById('pullups').value) || 0,
            weight: document.getElementById('weight').value || '',
            alcohol: document.getElementById('alcohol').value || '',
            notes: document.getElementById('notes').value || ''
        };

        fetch(CLOUD_URL, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(entry)
        })
        .then(() => {
            showStatus("Entry saved successfully!", true);
            form.reset();
            dateInput.valueAsDate = new Date();
            setTimeout(fetchCloudHistory, 1500);
        })
        .catch(error => {
            console.error('Error:', error);
            showStatus("Failed to save. Try again.", false);
            submitBtn.disabled = false;
            submitBtn.innerText = "Save Entry to Cloud";
        });
    });

    function showStatus(msg, isSuccess) {
        statusMessage.innerText = msg;
        statusMessage.className = "status-msg " + (isSuccess ? "status-success" : "status-error");
        statusMessage.style.display = "block";
    }

    function renderDashboard() {
        const tbody = document.getElementById('weekTableBody');
        tbody.innerHTML = '';

        const selectedDate = dateInput.value; 
        const weekDays = getWeekDays(selectedDate);
        
        // Update header sub-labels to show day numbers
        const dayLabels = ['mon','tue','wed','thu','fri','sat','sun'];
        dayLabels.forEach((label, index) => {
            const cleanDayNum = weekDays[index].split('-')[2];
            document.getElementById(`th-${label}`).innerHTML = `${label.toUpperCase()}<br><span style="font-size:10px; font-weight:normal; color:var(--text-muted);">${cleanDayNum}</span>`;
        });

        // Set dynamic timeframe header title 
        document.getElementById('weekViewTitle').innerText = `Week View (${weekDays[0]} to ${weekDays[6]})`;

        // Matrix map to keep tracking keys paired with day data
        let daily = { run: 0, bike: 0, strength: 0, crunches: 0, pullups: 0 };
        let weekly = { run: 0, bike: 0, strength: 0, crunches: 0, pullups: 0 };
        
        // Structures for mapping values dynamically across the columns
        const rowStructure = {
            runTime: { label: 'Run Time (m)', days: [0,0,0,0,0,0,0] },
            bikeTime: { label: 'Bike Time (m)', days: [0,0,0,0,0,0,0] },
            strengthTime: { label: 'Strength (m)', days: [0,0,0,0,0,0,0] },
            crunches: { label: 'Crunches', days: [0,0,0,0,0,0,0] },
            pullups: { label: 'Pull Ups', days: [0,0,0,0,0,0,0] },
            deficit: { label: 'Calorie Deficit', days: [0,0,0,0,0,0,0] }
        };

        fitnessData.forEach(entry => {
            // Log target day calculations
            if (entry.date === selectedDate) {
                daily.run += entry.runTime || 0;
                daily.bike += entry.bikeTime || 0;
                daily.strength += entry.strengthTime || 0;
                daily.crunches += entry.crunches || 0;
                daily.pullups += entry.pullups || 0;
            }
            
            // Map data items into the weekly day-of-week slots
            const dayIndex = weekDays.indexOf(entry.date);
            if (dayIndex !== -1) {
                rowStructure.runTime.days[dayIndex] += entry.runTime || 0;
                rowStructure.bikeTime.days[dayIndex] += entry.bikeTime || 0;
                rowStructure.strengthTime.days[dayIndex] += entry.strengthTime || 0;
                rowStructure.crunches.days[dayIndex] += entry.crunches || 0;
                rowStructure.pullups.days[dayIndex] += entry.pullups || 0;
                rowStructure.deficit.days[dayIndex] += entry.deficit || 0;

                // Also calculate header totals
                weekly.run += entry.runTime || 0;
                weekly.bike += entry.bikeTime || 0;
                weekly.strength += entry.strengthTime || 0;
                weekly.crunches += entry.crunches || 0;
                weekly.pullups += entry.pullups || 0;
            }
        });

        // Loop over structure object keys and construct HTML rows
        Object.keys(rowStructure).forEach(key => {
            const tr = document.createElement('tr');
            let cellsHTML = `<td class="row-label">${rowStructure[key].label}</td>`;
            
            rowStructure[key].days.forEach(val => {
                const displayVal = val === 0 ? '-' : val.toLocaleString();
                const cssClass = val > 0 ? 'class="has-value"' : '';
                cellsHTML += `<td ${cssClass}>${displayVal}</td>`;
            });
            
            tr.innerHTML = cellsHTML;
            tbody.appendChild(tr);
        });

        // Compute top-level goal summary percentages
        const runPct = Math.round((weekly.run / WEEKLY_GOALS.run) * 100);
        const bikePct = Math.round((weekly.bike / WEEKLY_GOALS.bike) * 100);
        const strengthPct = Math.round((weekly.strength / WEEKLY_GOALS.strength) * 100);
        const crunchPct = Math.round((weekly.crunches / WEEKLY_GOALS.crunches) * 100);
        const pullupPct = Math.round((weekly.pullups / WEEKLY_GOALS.pullups) * 100);

        // Update card numbers (Daily values)
        document.getElementById('stat-run').innerText = `${daily.run} min`;
        document.getElementById('stat-bike').innerText = `${daily.bike} min`;
        document.getElementById('stat-strength').innerText = `${daily.strength} min`;
        document.getElementById('stat-reps').innerText = `${daily.crunches} / ${daily.pullups}`;

        // Update card percentages
        document.getElementById('progress-run').innerHTML = `<span class="progress-percentage">${runPct}%</span> of weekly goal (${weekly.run}/${WEEKLY_GOALS.run}m)`;
        document.getElementById('progress-bike').innerHTML = `<span class="progress-percentage">${bikePct}%</span> of weekly goal (${weekly.bike}/${WEEKLY_GOALS.bike}m)`;
        document.getElementById('progress-strength').innerHTML = `<span class="progress-percentage">${strengthPct}%</span> of weekly goal (${weekly.strength}/${WEEKLY_GOALS.strength}m)`;
        document.getElementById('progress-reps').innerHTML = `Weekly: <span class="progress-percentage">${crunchPct}%</span> C (${weekly.crunches}/${WEEKLY_GOALS.crunches}) | <span class="progress-percentage">${pullupPct}%</span> P (${weekly.pullups}/${WEEKLY_GOALS.pullups})`;
        
        submitBtn.disabled = false;
        submitBtn.innerText = "Save Entry to Cloud";
    }

    fetchCloudHistory();
</script>

</body>
</html>
